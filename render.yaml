services:
  - type: web
    name: cord-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://cord-ai.vercel.app
    disk:
      name: uploads
      mountPath: /uploads
      sizeGB: 1
